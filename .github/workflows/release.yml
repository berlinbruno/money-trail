name: Release (Production Build)

on:
  push:
    branches:
      - master

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install deps
        run: npm ci

      - name: Install Expo CLI
        run: npm install -g eas-cli@latest

      - name: Semantic Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npx semantic-release

      # ✅ Step 1: Build Production (Android)
      - name: Build Production (Android)
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
        run: eas build --profile production --platform android --non-interactive --wait

      # ✅ Step 2: Get latest finished Production build URL
      - name: Get latest finished Production build URL
        id: get-url
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
        run: |
          BUILD_URL=$(eas build:list --platform android --status finished --limit 1 --json --non-interactive | jq -r '.[0].artifacts.buildUrl')
          if [[ -z "$BUILD_URL" || "$BUILD_URL" == "null" ]]; then
            echo "No finished production builds found!"
            exit 1
          fi
          echo "build_url=$BUILD_URL" >> $GITHUB_OUTPUT

      # ✅ Step 3: Download Production APK with dynamic name
      - name: Download Production APK
        run: |
          APP_NAME=$(node -p "require('./app.json').expo.name")
          APP_VERSION=$(node -p "require('./package.json').version")
          FILE_NAME="${APP_NAME}-production-${APP_VERSION}.apk"
          echo "Downloading $FILE_NAME from ${{ steps.get-url.outputs.build_url }}"
          curl -L -o "$FILE_NAME" "${{ steps.get-url.outputs.build_url }}"
          echo "APK_NAME=$FILE_NAME" >> $GITHUB_ENV

      # ✅ Step 4: Upload Production APK as artifact
      - name: Upload Production APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: '${{ env.APK_NAME }}'
          path: '${{ env.APK_NAME }}'

      # ✅ Optional: Attach APK to GitHub Release
      - name: Upload Production APK to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: '${{ env.APK_NAME }}'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
