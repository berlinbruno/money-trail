name: CI Dev (Lint + Preview Build)

on:
  push:
    branches:
      - dev

jobs:
  lint-and-validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install deps
        run: npm ci

      - name: Run lint
        run: npm run lint

      - name: Type check
        run: npm run type-check

  preview-build:
    needs: lint-and-validate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install deps
        run: npm ci

      - name: Install Expo CLI
        run: npm install -g eas-cli

      - name: Build preview (Android)
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
        run: eas build --profile preview --platform android --non-interactive --wait

      # ✅ Download the built APK from EAS
      - name: Download build artifact from EAS
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
        run: |
          BUILD_URL=$(eas build:list --limit 1 --json | jq -r '.[0].artifacts.buildUrl')
          echo "Downloading from $BUILD_URL"
          curl -L -o preview.apk "$BUILD_URL"

      - name: Upload Preview APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: preview-apk
          path: preview.apk
