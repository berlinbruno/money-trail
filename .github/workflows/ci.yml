name: CI (Lint + Preview Build)

on:
  push:
    branches:
      - dev
  pull_request:
    branches:
      - dev

jobs:
  lint-and-validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install deps
        run: npm ci

      - name: Check Expo dependencies
        run: npx expo install --check

      - name: Run Prettier check
        run: npm run format:check

      - name: Run lint
        run: npm run lint

      - name: Type check
        run: npm run type-check

  preview-build:
    needs: lint-and-validate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install deps
        run: npm ci

      - name: Install Expo CLI
        run: npm install -g eas-cli

      - name: Build preview (Android)
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
        run: eas build --profile preview --platform android --non-interactive --wait

      # ✅ Dynamic file name: <app-name>-preview-<version>.apk
      - name: Download build artifact from EAS
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
        run: |
          APP_NAME=$(node -p "require('./app.json').expo.name")
          APP_VERSION=$(node -p "require('./package.json').version")
          BUILD_URL=$(eas build:list --limit 1 --json | jq -r '.[0].artifacts.buildUrl')
          FILENAME="${APP_NAME}-preview-${APP_VERSION}.apk"
          echo "Downloading $FILENAME from $BUILD_URL"
          curl -L -o "$FILENAME" "$BUILD_URL"
          echo "APK_NAME=$FILENAME" >> $GITHUB_ENV

      - name: Upload Preview APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.APK_NAME }}
          path: ${{ env.APK_NAME }}
