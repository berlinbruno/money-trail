# Feature Branch Quality Checks Workflow
# Renamed from feature-check.yml for clarity and consistency
# Place this file in .github/workflows/feature-quality-check.yml

name: Feature Branch Quality Checks

on:
  push:
    branches:
      - 'feature/**'
  pull_request:
    branches:
      - 'feature/**'

jobs:
  feature-quality-checks:
    runs-on: ubuntu-latest
    env:
      HUSKY: 0 # 🚀 disable husky globally for CI
    steps:
      - name: Checkout Feature Branch Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Setup Node.js (Feature)
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - name: Install npm dependencies (Feature)
        run: npm ci
      - name: Run ESLint (Feature)
        run: npm run lint
      - name: Run Prettier Format Check (Feature)
        run: npm run format:check
      - name: Run TypeScript Type Check (Feature)
        run: npm run type-check
      - name: Validate Commit Messages (Feature)
        uses: wagoid/commitlint-github-action@v6
        with:
          configFile: .commitlintrc.json
